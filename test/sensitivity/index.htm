<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sensitivity Parameter — Test Runner</title>
    <style>
        body { margin: 0; background: #0d0d0d; color: #ccc; font-family: 'Roboto Mono', monospace; padding: 20px; }
        h1 { color: #fff; font-size: 1.1rem; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .scenario { background: #151515; border: 1px solid #333; border-radius: 4px; padding: 15px; margin-bottom: 15px; }
        .scenario-title { font-weight: bold; color: #a29bfe; margin-bottom: 6px; }
        .row { display: flex; gap: 20px; font-size: 0.85rem; margin-bottom: 4px; }
        .label { color: #888; min-width: 280px; }
        .value { color: #fff; font-family: monospace; }
        .pass { color: #00ff00; font-weight: bold; }
        .fail { color: #ff4757; font-weight: bold; }
        .separator { border: none; border-top: 1px solid #333; margin: 8px 0; }
        #summary { font-size: 1rem; font-weight: bold; padding: 12px; border-radius: 4px; margin-top: 10px; }
        #summary.all-pass { background: #1a3a1a; color: #00ff00; border: 1px solid #00ff00; }
        #summary.has-fail  { background: #3a1a1a; color: #ff4757; border: 1px solid #ff4757; }
        #running { color: #fab1a0; margin-bottom: 15px; }
        .back { font-size: 0.8rem; color: #666; margin-bottom: 16px; }
        .back a { color: #a29bfe; text-decoration: none; }
    </style>
</head>
<body>
    <div class="back"><a href="../">&larr; all tests</a></div>
    <h1>Sensitivity Parameter — Behaviour Tests (SS-1 to SS-4)</h1>
    <div id="running">Running scenarios… (this may take 30–60 seconds)</div>
    <div id="output"></div>
    <div id="summary"></div>

<script type="module">
import { createSuite } from '../../test_framework.js';
import { registerScenarios } from '../../tests/sensitivity.js';
const suite = createSuite('sensitivity', 'Sensitivity Parameter');
registerScenarios(suite.scenario);
suite.run();
</script>
</body>
</html>
