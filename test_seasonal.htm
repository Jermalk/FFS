<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Seasonal Logic — Test Runner</title>
    <style>
        body { margin: 0; background: #0d0d0d; color: #ccc; font-family: 'Roboto Mono', monospace; padding: 20px; }
        h1 { color: #fff; font-size: 1.1rem; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .scenario { background: #151515; border: 1px solid #333; border-radius: 4px; padding: 15px; margin-bottom: 15px; }
        .scenario-title { font-weight: bold; color: #a29bfe; margin-bottom: 10px; }
        .row { display: flex; gap: 20px; font-size: 0.85rem; margin-bottom: 4px; }
        .label { color: #888; min-width: 280px; }
        .value { color: #fff; font-family: monospace; }
        .pass { color: #00ff00; font-weight: bold; }
        .fail { color: #ff4757; font-weight: bold; }
        .separator { border: none; border-top: 1px solid #333; margin: 8px 0; }
        #summary { font-size: 1rem; font-weight: bold; padding: 12px; border-radius: 4px; margin-top: 10px; }
        #summary.all-pass { background: #1a3a1a; color: #00ff00; border: 1px solid #00ff00; }
        #summary.has-fail  { background: #3a1a1a; color: #ff4757; border: 1px solid #ff4757; }
        #running { color: #fab1a0; margin-bottom: 15px; }
    </style>
</head>
<body>
    <h1>Seasonal Logic — Behaviour Tests (SL-1 to SL-6)</h1>
    <div id="running">Running scenarios… (this may take 30–60 seconds)</div>
    <div id="output"></div>
    <div id="summary"></div>

<script type="module">
import { SimulationEngine, CLIMATE_PRESETS } from './simulation-engine.js';

// ---------------------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------------------

const SEASON_NAMES = ['Spring', 'Summer', 'Autumn', 'Winter'];

function runYears(sim, years) {
    for (let i = 0; i < years * 4; i++) sim.update();
}

function clearGrid(sim) {
    sim.stateGrid.fill(0);
    sim.nextStateGrid.fill(0);
    sim.ageGrid.fill(0);
    sim.nextAgeGrid.fill(0);
    sim.stats = { biomass: 0, oldGrowth: 0 };
}

// stats.biomass counts trees that WERE trees at tick start; new trees grown this tick
// are in stateGrid after the double-buffer swap but not yet in stats. Count directly.
function countTrees(sim) {
    let n = 0;
    for (let i = 0; i < sim.size; i++) if (sim.stateGrid[i] === 1) n++;
    return n;
}

let passed = 0, failed = 0;
const out = document.getElementById('output');

function scenario(title, fn) {
    const div = document.createElement('div');
    div.className = 'scenario';
    div.innerHTML = `<div class="scenario-title">${title}</div>`;
    out.appendChild(div);

    const checks = [];
    const values = [];

    function val(label, v) { values.push({ label, v }); }

    function check(label, condition, detail) {
        if (condition) {
            passed++;
            checks.push(`<div class="row"><span class="label">${label}</span><span class="pass">PASS</span>${detail ? '<span class="value" style="margin-left:10px;color:#888">'+detail+'</span>' : ''}</div>`);
        } else {
            failed++;
            checks.push(`<div class="row"><span class="label">${label}</span><span class="fail">FAIL</span>${detail ? '<span class="value" style="margin-left:10px;color:#ff4757">'+detail+'</span>' : ''}</div>`);
        }
    }

    fn(val, check);

    const valHtml = values.map(({ label, v }) =>
        `<div class="row"><span class="label">${label}</span><span class="value">${v}</span></div>`
    ).join('');

    div.innerHTML += valHtml + '<hr class="separator">' + checks.join('');
}

// ---------------------------------------------------------------------------
// SL-1 — Preset Integrity
// Pure arithmetic on CLIMATE_PRESETS — no simulation.
// Verifies S2 (rain balanced), S3 (temp balanced), S1 (rain floor).
// ---------------------------------------------------------------------------
scenario('SL-1 — Preset integrity: sum(tMod)=0, sum(rMod)=0, driest rain ≥ 0.05', (val, check) => {
    for (const [key, preset] of Object.entries(CLIMATE_PRESETS)) {
        const tSum    = preset.seasons.reduce((s, ss) => s + ss.tMod, 0);
        const rSum    = preset.seasons.reduce((s, ss) => s + ss.rMod, 0);
        const minRMod = Math.min(...preset.seasons.map(s => s.rMod));
        const driest  = preset.BASE_RAIN + minRMod;

        val(`${preset.label} — tMod sum`, tSum.toFixed(0));
        val(`${preset.label} — rMod sum`, rSum.toFixed(6));
        val(`${preset.label} — driest season BASE_RAIN+rMod`, driest.toFixed(3));

        check(`${preset.label}: sum(tMod) = 0`,      tSum === 0,             `got ${tSum}`);
        check(`${preset.label}: sum(rMod) = 0`,      Math.abs(rSum) < 1e-9,  `got ${rSum.toFixed(6)}`);
        check(`${preset.label}: driest rain ≥ 0.05`, driest >= 0.05,         `got ${driest.toFixed(3)}`);
    }
});

// ---------------------------------------------------------------------------
// SL-2 — Season Cycling & Startup
// Verifies S4: fresh engine at Winter/Year 0; first tick → Spring/Year 1.
// ---------------------------------------------------------------------------
scenario('SL-2 — Season cycling & startup (S4 regression)', (val, check) => {
    const sim = new SimulationEngine(800, 600);

    val('Initial ticks',  sim.ticks);
    val('Initial season', `${sim.season} (${SEASON_NAMES[sim.season]})`);
    val('Initial year',   sim.year);

    check('Initial ticks = 3',           sim.ticks  === 3, `got ${sim.ticks}`);
    check('Initial season = 3 (Winter)', sim.season === 3, `got ${sim.season}`);
    check('Initial year = 0',            sim.year   === 0, `got ${sim.year}`);

    sim.update();
    val('After 1st update — season', `${sim.season} (${SEASON_NAMES[sim.season]})`);
    val('After 1st update — year',   sim.year);

    check('After 1 tick: season = 0 (Spring)', sim.season === 0, `got ${sim.season}`);
    check('After 1 tick: year = 1',            sim.year   === 1, `got ${sim.year}`);

    for (let i = 0; i < 4; i++) sim.update();  // 4 more = full cycle back to Spring
    val('After full year — season', `${sim.season} (${SEASON_NAMES[sim.season]})`);
    val('After full year — year',   sim.year);

    check('After 1 full year: season = 0 (Spring)', sim.season === 0, `got ${sim.season}`);
    check('After 1 full year: year = 2',            sim.year   === 2, `got ${sim.year}`);
});

// ---------------------------------------------------------------------------
// SL-3 — Annual Climate Convergence
// Over 50 years, mean(currentTemp) ≈ BASE_TEMP ±1°C and mean(currentRain) ≈ BASE_RAIN ±0.04.
// Confirms that balanced modifiers (S2, S3) hold at runtime, not just arithmetically.
// Tests three presets with distinct BASE values.
// ---------------------------------------------------------------------------
scenario('SL-3 — Annual climate convergence over 50 yr (S2/S3 runtime check)', (val, check) => {
    const YEARS = 50;
    const TICKS = YEARS * 4;

    for (const key of ['temperate', 'mediterranean', 'boreal']) {
        const preset = CLIMATE_PRESETS[key];
        const sim = new SimulationEngine(800, 600);
        sim.params.climateType = key;

        let tSum = 0, rSum = 0;
        for (let i = 0; i < TICKS; i++) {
            sim.update();
            tSum += sim.currentTemp;
            rSum += sim.currentRain;
        }
        const tMean = tSum / TICKS;
        const rMean = rSum / TICKS;

        val(`${preset.label} mean temp  (target ${preset.BASE_TEMP}°C)`, tMean.toFixed(2) + '°C');
        val(`${preset.label} mean rain  (target ${preset.BASE_RAIN})`,   rMean.toFixed(3));

        check(`${preset.label}: mean temp ≈ BASE_TEMP ±1°C`,
            Math.abs(tMean - preset.BASE_TEMP) <= 1.0,
            `${tMean.toFixed(2)}°C vs ${preset.BASE_TEMP}°C`);

        check(`${preset.label}: mean rain ≈ BASE_RAIN ±0.04`,
            Math.abs(rMean - preset.BASE_RAIN) <= 0.04,
            `${rMean.toFixed(3)} vs ${preset.BASE_RAIN}`);
    }
});

// ---------------------------------------------------------------------------
// SL-4 — Winter Dormancy
// Boreal winter tick (season=3, temp ≈ −22°C): growthTempFactor=0 → zero new trees.
// Boreal summer tick (season=1, temp ≈ +20°C): growthTempFactor=1 → ~3800 new trees.
// Verifies S5 (growthTempFactor suppresses pGrowth at low temperature).
// ticks is set directly so the next update() lands on the target season.
// ---------------------------------------------------------------------------
scenario('SL-4 — Winter dormancy blocks growth; summer allows growth (S5 regression)', (val, check) => {
    // Winter: ticks=2 → update() → ticks=3, season=3%4=3 (Winter)
    const simW = new SimulationEngine(800, 600);
    simW.params.climateType = 'boreal';
    clearGrid(simW);
    simW.soilWater = 0.7;
    simW.ticks = 2;
    simW.update();

    val('Winter season',             `${simW.season} (${SEASON_NAMES[simW.season]})`);
    val('Winter currentTemp',        simW.currentTemp.toFixed(1) + '°C');
    val('New trees after winter tick', countTrees(simW));

    check('Winter season index = 3',           simW.season      === 3, `got ${simW.season}`);
    check('Winter temp < 5°C (dormancy zone)', simW.currentTemp  < 5,  `got ${simW.currentTemp.toFixed(1)}°C`);
    check('Zero new trees in boreal winter',   countTrees(simW) === 0,  `got ${countTrees(simW)}`);

    // Summer: ticks=0 → update() → ticks=1, season=1%4=1 (Summer)
    const simS = new SimulationEngine(800, 600);
    simS.params.climateType = 'boreal';
    clearGrid(simS);
    simS.soilWater = 0.7;
    simS.ticks = 0;
    simS.update();

    val('Summer season',             `${simS.season} (${SEASON_NAMES[simS.season]})`);
    val('Summer currentTemp',        simS.currentTemp.toFixed(1) + '°C');
    val('New trees after summer tick', countTrees(simS));

    check('Summer season index = 1',          simS.season      === 1,           `got ${simS.season}`);
    check('Summer temp ≥ 5°C (growth zone)',  simS.currentTemp  >= 5,           `got ${simS.currentTemp.toFixed(1)}°C`);
    check('Growth in boreal summer (> 1000)', countTrees(simS)  > 1000,         `got ${countTrees(simS)}`);
});

// ---------------------------------------------------------------------------
// SL-5 — Climate Differentiation
// Mean temperature ordering: Boreal < Temperate < Mediterranean < Tropical.
// Soil water ordering: Semi-Arid driest after 50 yr.
// Verifies S6 (presets produce distinct, correctly ordered climate conditions).
// ---------------------------------------------------------------------------
scenario('SL-5 — Climate differentiation over 50 yr (S6 regression)', (val, check) => {
    const YEARS = 50;
    const TICKS = YEARS * 4;
    const results = {};

    for (const key of Object.keys(CLIMATE_PRESETS)) {
        const sim = new SimulationEngine(800, 600);
        sim.params.climateType = key;

        let tSum = 0;
        for (let i = 0; i < TICKS; i++) { sim.update(); tSum += sim.currentTemp; }
        results[key] = { meanTemp: tSum / TICKS, soilWater: sim.soilWater };
    }

    for (const [key, r] of Object.entries(results)) {
        val(`${CLIMATE_PRESETS[key].label} mean temp`, r.meanTemp.toFixed(1) + '°C');
    }
    val('Temperate soil water (50yr)', (results.temperate.soilWater * 100).toFixed(0) + '%');
    val('Semi-Arid soil water (50yr)', (results.semiarid.soilWater  * 100).toFixed(0) + '%');

    check('Boreal cooler than Temperate',
        results.boreal.meanTemp < results.temperate.meanTemp,
        `boreal=${results.boreal.meanTemp.toFixed(1)}°C < temperate=${results.temperate.meanTemp.toFixed(1)}°C`);

    check('Temperate cooler than Mediterranean',
        results.temperate.meanTemp < results.mediterranean.meanTemp,
        `temperate=${results.temperate.meanTemp.toFixed(1)}°C < med=${results.mediterranean.meanTemp.toFixed(1)}°C`);

    check('Mediterranean cooler than Tropical',
        results.mediterranean.meanTemp < results.tropical.meanTemp,
        `med=${results.mediterranean.meanTemp.toFixed(1)}°C < tropical=${results.tropical.meanTemp.toFixed(1)}°C`);

    check('Semi-Arid drier than Temperate after 50yr',
        results.semiarid.soilWater < results.temperate.soilWater,
        `semiarid=${(results.semiarid.soilWater*100).toFixed(0)}% < temperate=${(results.temperate.soilWater*100).toFixed(0)}%`);
});

// ---------------------------------------------------------------------------
// SL-6 — Climate Switching Resets Engine
// After setClimate(), engine returns to init state (year=0, ticks=3, season=3).
// Verifies S6 (setClimate calls reset() correctly).
// ---------------------------------------------------------------------------
scenario('SL-6 — Climate switch resets engine to initial state (S6 regression)', (val, check) => {
    const sim = new SimulationEngine(800, 600);
    runYears(sim, 20);

    val('Year before switch',    sim.year);
    val('Ticks before switch',   sim.ticks);
    val('Climate before switch', sim.params.climateType);

    sim.setClimate('mediterranean');

    val('Climate after switch', sim.params.climateType);
    val('Year after switch',    sim.year);
    val('Ticks after switch',   sim.ticks);
    val('Season after switch',  `${sim.season} (${SEASON_NAMES[sim.season]})`);

    check('Climate type updated',       sim.params.climateType === 'mediterranean', `got ${sim.params.climateType}`);
    check('Year reset to 0',            sim.year   === 0, `got ${sim.year}`);
    check('Ticks reset to 3',           sim.ticks  === 3, `got ${sim.ticks}`);
    check('Season reset to 3 (Winter)', sim.season === 3, `got ${sim.season}`);
});

// ---------------------------------------------------------------------------
// Summary
// ---------------------------------------------------------------------------
document.getElementById('running').style.display = 'none';

const summary = document.getElementById('summary');
const total = passed + failed;
if (failed === 0) {
    summary.className = 'all-pass';
    summary.innerText = `All ${total} checks passed`;
} else {
    summary.className = 'has-fail';
    summary.innerText = `${failed} of ${total} checks FAILED`;
}
</script>
</body>
</html>
